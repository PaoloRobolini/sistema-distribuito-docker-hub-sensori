<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <!-- Header -->
                <div class="text-center mb-4">
                    <h1>🏙️ Smart City Hub</h1>
                    <p class="text-muted">Piattaforma di monitoraggio sensori ambientali</p>
                    <span class="badge bg-info fs-6">
                        Servito da: <strong>{{ hostname }}</strong>
                    </span>
                </div>

                <!-- Form invio dati sensore -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">📡 Invio Dati Sensore</h5>
                    </div>
                    <div class="card-body">
                        <form id="sensorForm">
                            <div class="mb-3">
                                <label for="sensore" class="form-label">Tipo Sensore</label>
                                <select class="form-select" id="sensore" required>
                                    <option value="temperatura">🌡️ Temperatura</option>
                                    <option value="umidita">💧 Umidità</option>
                                    <option value="inquinamento">🏭 Inquinamento (PM2.5)</option>
                                    <option value="rumore">🔊 Rumore (dB)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="valore" class="form-label">Valore</label>
                                <input type="number" step="0.1" class="form-control"
                                       id="valore" placeholder="Es: 22.5" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                Pubblica sul Broker MQTT
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Area risposta -->
                <div id="risultato" class="alert d-none" role="alert"></div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById("sensorForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const risultato = document.getElementById("risultato");

            const payload = {
                sensore: document.getElementById("sensore").value,
                valore: parseFloat(document.getElementById("valore").value),
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch("/publish", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    risultato.className = "alert alert-success";
                    risultato.textContent = "✅ " + (data.messaggio || JSON.stringify(data));
                } else {
                    risultato.className = "alert alert-danger";
                    risultato.textContent = "❌ " + (data.errore || JSON.stringify(data));
                }
            } catch (err) {
                risultato.className = "alert alert-danger";
                risultato.textContent = "❌ Errore di rete: " + err.message;
            }

            risultato.classList.remove("d-none");
        });
    </script>
</body>
</html>
