services:

  caddy:
    image:
      caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - smartcity-net

  app1:
    build: 
      ./flask
    container_name: 
      app1
    networks:
      - smartcity-net

  app2:
   build: ./flask
   container_name: 
    app2
   networks:
     - smartcity-net

networks:
  smartcity-net:
    driver: bridge