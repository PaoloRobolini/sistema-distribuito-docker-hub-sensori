# ============================================================
# SMART CITY HUB - Docker Compose
# ============================================================

services:

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - smartcity-net

  app1:
    build: ./flask
    container_name: app1
    networks:
      - smartcity-net

  app2:
    build: ./flask
    container_name: app2
    networks:
      - smartcity-net

  emqx:
    image: emqx/emqx:latest
    container_name: emqx
    ports:
      - "18083:18083"
    expose:
      - "1883"
    networks:
      - smartcity-net

  worker:
    build: ./worker
    container_name: worker
    depends_on:
      - emqx
    restart: always
    networks:
      - smartcity-net

networks:
  smartcity-net:
    driver: bridge