# ============================================================
# SMART CITY HUB - Docker Compose
# ============================================================
# Completa questo file seguendo le fasi del progetto.
# Ogni sezione TODO corrisponde a una fase dell'attività.
# ============================================================

services:

  # ─── Servizio Webapp (istanza 1) ──────────────────────────
  # Questa è la prima istanza dell'applicazione Flask.
  # Costruisce l'immagine dal Dockerfile in ./webapp
  app1:
    build: ./webapp
    container_name: app1
    networks:
      - smartcity-net

  # Fase 1: Seconda istanza della webapp (load balancing)
  app2:
    build: ./webapp
    container_name: app2
    networks:
      - smartcity-net

  # Fase 1: Caddy - Reverse Proxy e Load Balancer
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - smartcity-net
    depends_on:
      - app1
      - app2

  # ============================================================
  # TODO FASE 2: Broker MQTT (EMQX)
  # ============================================================
  #
  # Aggiungi il servizio "emqx":
  #   - image: emqx/emqx:latest
  #   - container_name: emqx
  #   - ports:
  #       - "18083:18083"    # Dashboard web EMQX
  #     ATTENZIONE: NON esporre la porta 1883 verso l'host!
  #     (Vedi domanda B2 del report)
  #   - networks: [smartcity-net]
  #
  # ============================================================

  # ============================================================
  # TODO FASE 3: Worker MQTT
  # ============================================================
  #
  # Aggiungi il servizio "worker":
  #   - build: ./worker
  #   - container_name: worker
  #   - depends_on: [emqx]
  #   - networks: [smartcity-net]
  #
  # ============================================================

  # ============================================================
  # TODO FASE 4: Authelia (Forward Authentication)
  # ============================================================
  #
  # Aggiungi il servizio "authelia":
  #   - image: authelia/authelia:latest
  #   - container_name: authelia
  #   - volumes: ["./authelia:/config"]
  #   - ports: ["9091:9091"]
  #   - networks: [smartcity-net]
  #
  # ============================================================

# Fase 1: Rete personalizzata per la comunicazione tra i servizi
networks:
  smartcity-net:
    driver: bridge
